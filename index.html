<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Rotating Logo Intro</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #0c6d1f; 
      display: flex;
      justify-content: center;
      align-items: center;
    }

    
    .logo-wrapper {
      position: absolute;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;

      transform: translate(-50%, -50%) scale(1);
      top: 50%;
      left: 50%;

      animation: moveAndShrink 3s ease forwards 1.5s;
    }

    
    .logo-3d {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: spin 4s linear infinite;
    }

    
    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .front img,
    .back img {
      width: 260px;
      filter: drop-shadow(0 0 18px rgba(0,255,0,0.7));
    }

    .back {
      transform: rotateY(180deg);
    }

    /* Infinite rotation */
    @keyframes spin {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    /*
      Intro animation:
      1. Start center
      2. Shrink
      3. Slide to right side, 50px from top
    */
    @keyframes moveAndShrink {
      0% {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1);
      }

      60% {
        transform: translate(-50%, -50%) scale(0.6);
      }

      100% {
        top: 50px; 
        left: calc(100% - 120px);
        transform: translate(-50%, 0) scale(0.45);
      }
    }
  </style>
</head>

<body>

  <div class="logo-wrapper">
    <div class="logo-3d">

      <div class="face front">
        <img src="logo-21.png" />
      </div>

      <div class="face back">
        <img src="logo-21.png" />
      </div>

    </div>
  </div>

</body>
</html>
